name: Continuous Deployment to Azure

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Deploy to Azure via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          # 1. Di chuyển vào thư mục app trên Azure
          cd app
          
          # 2. Kéo code mới nhất từ GitHub về (Nếu là lần đầu, bạn có thể cần git clone hoặc thiết lập thư mục git trước)
          # Để đơn giản cho lần đầu thử nghiệm, ta đồng bộ code bằng cách kéo từ repo (đảm bảo repo công khai hoặc đã cấu hình deploy key)
          # Hoặc nếu chưa setup git trên server, bạn có thể dùng lệnh echo/cat để test.
          
          # Giả sử bạn đã git clone repo vào thư mục này trước đó:
          git pull origin master
          
          # 3. Kích hoạt môi trường ảo và cài đặt thư viện mới nếu có
          source venv/bin/activate
          pip install -r requirements.txt
          
          # 4. Tắt server cũ đang chạy ngầm (nếu có) để tránh trùng port
          # Tắt server cũ nếu đang chạy
          pkill -f uvicorn || true
            
            # Khởi chạy server FastAPI chạy ngầm và NGẮT HOÀN TOÀN kết nối nhập/xuất để giải phóng terminal
          nohup uvicorn main:app --host 0.0.0.0 --port 8000 </dev/null > uvicorn.log 2>&1 &
            
          echo "CD completed successfully!"
          
          echo "CD completed successfully!"  