name: Continuous Deployment to Azure

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Deploy to Azure via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          cd app
          
          # 1. Kéo code mới nhất về (trong đó có file deploy.sh)
          git pull origin master
          
          # 2. Cấp quyền thực thi cho file script
          chmod +x deploy.sh
          
          # 3. Kích hoạt file script chạy độc lập hoàn toàn khỏi session SSH hiện tại
          ./deploy.sh </dev/null >/dev/null 2>&1 &
          
          # Cho hệ thống nghỉ 1 giây để lệnh kịp kích hoạt
          sleep 1
          
          echo "CD triggered successfully!"  