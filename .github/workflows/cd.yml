name: Continuous Deployment to Azure

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Deploy to Azure via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          cd app
          git pull origin master
          source venv/bin/activate
          pip install -r requirements.txt
          
          # Tắt tiến trình python chạy main.py cũ nếu có
          pkill -9 -f "python src/main.py" || true
          
          # Khởi chạy server Python thuần chạy ngầm và giải phóng terminal hoàn toàn
          nohup python src/main.py > server.log 2>&1 </dev/null &
          
          echo "CD completed successfully!"  